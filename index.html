<!DOCTYPE html>
<html lang="ta">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Downloader - v2.1</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .loader { border-top-color: #3b82f6; animation: spinner 1s linear infinite; }
        @keyframes spinner { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        .tab-active { border-bottom: 3px solid #3b82f6; color: #3b82f6; }
    </style>
</head>
<body class="bg-[#0f172a] text-slate-200 min-h-screen font-sans">

    <div class="max-w-4xl mx-auto p-4 md:p-10">
        <div class="text-center mb-8">
            <h1 class="text-4xl font-extrabold text-white mb-2 tracking-tight">AI Multi-Downloader</h1>
            <span class="bg-blue-600/20 text-blue-400 px-3 py-1 rounded-full text-xs font-bold uppercase tracking-widest">
                Version 2.1 (Stable)
            </span>
        </div>

        <div class="bg-[#1e293b] rounded-3xl shadow-2xl overflow-hidden border border-slate-700/50">
            <div class="p-6 bg-[#1e293b] border-b border-slate-700/50">
                <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                    <div>
                        <label class="block text-sm font-medium text-slate-400 mb-2">Backend Connection Mode</label>
                        <div class="flex bg-[#0f172a] p-1 rounded-xl">
                            <button id="cfTab" onclick="switchMode('cloudflare')" class="flex-1 py-2 rounded-lg text-sm font-semibold transition-all bg-blue-600 text-white">Cloudflare</button>
                            <button id="ngTab" onclick="switchMode('ngrok')" class="flex-1 py-2 rounded-lg text-sm font-semibold transition-all">NGROK</button>
                        </div>
                    </div>
                    <div>
                        <label class="block text-sm font-medium text-slate-400 mb-2">Backend API URL</label>
                        <input type="text" id="apiBaseUrl" placeholder="Paste your Tunnel URL here..." 
                               class="w-full bg-[#0f172a] border border-slate-700 rounded-xl px-4 py-2 text-blue-400 outline-none focus:ring-2 focus:ring-blue-500">
                        <p class="text-[10px] text-slate-500 mt-1 italic">* For Cloudflare, open the URL once and click 'Visit Site' first.</p>
                    </div>
                </div>
            </div>

            <div class="p-6 md:p-8">
                <div class="flex flex-col md:flex-row gap-3">
                    <input type="text" id="videoUrl" placeholder="https://www.youtube.com/watch?v=..." 
                           class="flex-1 bg-[#0f172a] border border-slate-700 rounded-2xl px-5 py-4 outline-none focus:border-blue-500 transition-all text-lg">
                    <button onclick="fetchMetadata()" class="bg-blue-600 hover:bg-blue-700 text-white px-8 py-4 rounded-2xl font-bold transition shadow-lg shadow-blue-900/20 active:scale-95">
                        Analyze Link
                    </button>
                </div>

                <div id="loader" class="hidden flex flex-col items-center justify-center py-20">
                    <div class="loader w-14 h-14 border-4 border-slate-700 rounded-full mb-4"></div>
                    <p class="text-slate-400 animate-pulse">Fetching video details from Colab...</p>
                </div>

                <div id="displayArea" class="hidden mt-10">
                    <div class="flex flex-col md:flex-row gap-8 items-start">
                        <div class="w-full md:w-1/3">
                            <img id="vidThumb" class="w-full rounded-2xl shadow-xl border border-slate-700" src="" alt="Thumbnail">
                            <h3 id="vidTitle" class="mt-4 text-xl font-bold leading-tight text-white"></h3>
                        </div>
                        
                        <div class="flex-1 w-full">
                            <div class="mb-6 bg-[#0f172a] p-4 rounded-2xl flex justify-around">
                                <label class="flex items-center gap-2 cursor-pointer group">
                                    <input type="radio" name="target" value="local" checked class="w-4 h-4 accent-blue-500">
                                    <span class="text-sm font-semibold group-hover:text-blue-400 transition">PC Download</span>
                                </label>
                                <label class="flex items-center gap-2 cursor-pointer group">
                                    <input type="radio" name="target" value="drive" class="w-4 h-4 accent-green-500">
                                    <span class="text-sm font-semibold group-hover:text-green-400 transition">Save to G-Drive</span>
                                </label>
                            </div>

                            <div class="grid grid-cols-1 lg:grid-cols-2 gap-4">
                                <div>
                                    <h4 class="text-blue-400 text-xs font-black uppercase mb-3 tracking-widest">Video Formats</h4>
                                    <div id="vList" class="space-y-2"></div>
                                </div>
                                <div>
                                    <h4 class="text-yellow-500 text-xs font-black uppercase mb-3 tracking-widest">Audio Only</h4>
                                    <div id="aList" class="space-y-2"></div>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
        <p class="text-center mt-6 text-slate-500 text-xs">Developed for Google Colab + Cloudflare/NGROK | 2026 Edition</p>
    </div>

    <script>
        let currentMode = 'cloudflare';

        function switchMode(mode) {
            currentMode = mode;
            document.getElementById('cfTab').className = mode === 'cloudflare' ? 'flex-1 py-2 rounded-lg text-sm font-semibold transition-all bg-blue-600 text-white' : 'flex-1 py-2 rounded-lg text-sm font-semibold transition-all';
            document.getElementById('ngTab').className = mode === 'ngrok' ? 'flex-1 py-2 rounded-lg text-sm font-semibold transition-all bg-blue-600 text-white' : 'flex-1 py-2 rounded-lg text-sm font-semibold transition-all';
        }

        async function fetchMetadata() {
            const url = document.getElementById('videoUrl').value;
            const apiBase = document.getElementById('apiBaseUrl').value;
            
            if(!url || !apiBase) return alert("Please enter Video URL and API URL!");

            document.getElementById('loader').classList.remove('hidden');
            document.getElementById('displayArea').classList.add('hidden');

            try {
                const response = await fetch(`${apiBase}/get_info`, {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({ url: url })
                });
                
                if(!response.ok) throw new Error("API Error");
                
                const data = await response.json();
                renderUI(data);
            } catch (err) {
                alert("Error: Connection refused. If using Cloudflare, make sure you visited the URL manually first.");
            } finally {
                document.getElementById('loader').classList.add('hidden');
            }
        }

        function renderUI(data) {
            document.getElementById('displayArea').classList.remove('hidden');
            document.getElementById('vidTitle').innerText = data.title;
            document.getElementById('vidThumb').src = data.thumbnail;

            const vList = document.getElementById('vList');
            vList.innerHTML = '';
            data.video.forEach(v => {
                vList.innerHTML += `<button onclick="startDownload('${v.id}')" class="w-full bg-slate-800 hover:bg-slate-700 p-3 rounded-xl text-left text-sm flex justify-between items-center transition">
                    <span>${v.res}</span> <span class="text-slate-500 text-[10px]">${v.ext}</span>
                </button>`;
            });

            const aList = document.getElementById('aList');
            aList.innerHTML = '';
            data.audio.forEach(a => {
                aList.innerHTML += `<button onclick="startDownload('${a.id}')" class="w-full bg-slate-800 hover:bg-slate-700 p-3 rounded-xl text-left text-sm flex justify-between items-center transition">
                    <span>${a.abr}kbps</span> <span class="text-slate-500 text-[10px]">${a.ext}</span>
                </button>`;
            });
        }

        async function startDownload(formatId) {
            const url = document.getElementById('videoUrl').value;
            const mode = document.querySelector('input[name="target"]:checked').value;
            const apiBase = document.getElementById('apiBaseUrl').value;

            alert("Download process started in backend. Stay on this page.");

            try {
                const res = await fetch(`${apiBase}/download`, {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({ url, format_id: formatId, mode: mode })
                });

                if(mode === 'local') {
                    const blob = await res.blob();
                    const dUrl = window.URL.createObjectURL(blob);
                    const a = document.createElement('a');
                    a.href = dUrl;
                    a.download = `file_${formatId}.mp4`;
                    document.body.appendChild(a);
                    a.click();
                    alert("Download triggered to your computer!");
                } else {
                    const status = await res.json();
                    alert(status.message);
                }
            } catch (e) {
                alert("Download failed. Check Colab logs.");
            }
        }
    </script>
</body>
</html>
