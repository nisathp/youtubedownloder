<!DOCTYPE html>
<html lang="ta">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Downloader Pro - v2.5</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .loader { border-top-color: #3b82f6; animation: spinner 1s linear infinite; }
        @keyframes spinner { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body class="bg-[#0f172a] text-slate-200 min-h-screen p-4">

    <div class="max-w-4xl mx-auto bg-[#1e293b] rounded-3xl shadow-2xl overflow-hidden border border-slate-700/50 p-6">
        <h1 class="text-3xl font-bold text-center text-white mb-6">YouTube Downloader <span class="text-blue-500 text-sm">v2.5</span></h1>

        <div class="mb-6 p-4 bg-[#0f172a] rounded-2xl border border-slate-700">
            <input type="text" id="apiBaseUrl" placeholder="Cloudflare or NGROK URL..." 
                   class="w-full bg-transparent border-none outline-none text-blue-400 font-mono text-sm">
        </div>

        <div class="flex flex-col md:flex-row gap-2 mb-8">
            <input type="text" id="videoUrl" placeholder="Paste YouTube Link..." class="flex-1 bg-[#0f172a] border border-slate-700 rounded-xl px-4 py-3 outline-none focus:border-blue-500">
            <button onclick="fetchInfo()" class="bg-blue-600 hover:bg-blue-700 px-8 py-3 rounded-xl font-bold transition">Analyze</button>
        </div>

        <div id="progressArea" class="hidden mb-6 p-4 bg-slate-800 rounded-xl">
            <div class="flex justify-between text-xs font-bold mb-2">
                <span id="statusLabel" class="text-blue-400">Processing...</span>
                <span id="pPercent">0%</span>
            </div>
            <div class="w-full bg-slate-700 h-3 rounded-full overflow-hidden">
                <div id="pBar" class="bg-blue-500 h-full transition-all" style="width: 0%"></div>
            </div>
            <div id="readyArea" class="hidden mt-4 text-center">
                <a id="finalLink" class="bg-green-600 hover:bg-green-700 text-white px-6 py-2 rounded-lg font-bold inline-block">Click to Save to PC</a>
            </div>
        </div>

        <div id="result" class="hidden grid grid-cols-1 md:grid-cols-3 gap-6">
            <div class="md:col-span-1">
                <img id="thumb" class="w-full rounded-xl shadow-lg border border-slate-700">
                <h3 id="title" class="mt-3 font-bold text-sm"></h3>
            </div>
            <div class="md:col-span-2 space-y-4">
                <div class="flex gap-4 p-2 bg-slate-800 rounded-lg justify-center text-sm">
                    <label><input type="radio" name="mode" value="local" checked> Local PC</label>
                    <label><input type="radio" name="mode" value="drive"> G-Drive</label>
                </div>
                <div class="grid grid-cols-2 gap-4">
                    <div>
                        <h4 class="text-blue-400 text-xs font-bold mb-2 uppercase">Video (High Quality)</h4>
                        <div id="vButtons" class="space-y-2"></div>
                    </div>
                    <div>
                        <h4 class="text-yellow-500 text-xs font-bold mb-2 uppercase">Audio Only</h4>
                        <div id="aButtons" class="space-y-2"></div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        async function fetchInfo() {
            const url = document.getElementById('videoUrl').value.trim();
            const api = document.getElementById('apiBaseUrl').value.trim();
            if(!url || !api) return alert("URL-களைச் சரிபார்க்கவும்!");

            const res = await fetch(`${api}/get_info`, {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({url})
            });
            const data = await res.json();
            
            document.getElementById('result').classList.remove('hidden');
            document.getElementById('title').innerText = data.title;
            document.getElementById('thumb').src = data.thumbnail;

            const renderBtn = (container, list) => {
                container.innerHTML = '';
                list.forEach(item => {
                    const btn = document.createElement('button');
                    btn.className = "w-full bg-slate-700 hover:bg-slate-600 p-2 rounded text-xs text-left transition";
                    btn.innerText = item.res || `${item.abr}kbps`;
                    btn.onclick = () => startDownload(item.id);
                    container.appendChild(btn);
                });
            };
            renderBtn(document.getElementById('vButtons'), data.video);
            renderBtn(document.getElementById('aButtons'), data.audio);
        }

        async function startDownload(fId) {
            const url = document.getElementById('videoUrl').value.trim();
            const api = document.getElementById('apiBaseUrl').value.trim();
            const mode = document.querySelector('input[name="mode"]:checked').value;

            document.getElementById('progressArea').classList.remove('hidden');
            document.getElementById('readyArea').classList.add('hidden');
            
            // Start Progress Tracking
            const timer = setInterval(async () => {
                const pRes = await fetch(`${api}/get_progress`);
                const pData = await pRes.json();
                document.getElementById('pBar').style.width = pData.percent + '%';
                document.getElementById('pPercent').innerText = pData.percent + '%';
                if(pData.percent == "100") document.getElementById('statusLabel').innerText = "Merging Files...";
            }, 1000);

            try {
                const res = await fetch(`${api}/download`, {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({url, format_id: fId, mode: mode})
                });
                const result = await res.json();
                clearInterval(timer);

                if(result.status === 'ready') {
                    document.getElementById('statusLabel').innerText = "Download Ready!";
                    document.getElementById('readyArea').classList.remove('hidden');
                    const link = document.getElementById('finalLink');
                    link.href = `${api}/stream/${result.file_id}`;
                    link.download = result.name;
                } else {
                    alert(result.message);
                    document.getElementById('progressArea').classList.add('hidden');
                }
            } catch (e) {
                clearInterval(timer);
                alert("Connection Error! (Tunnel might be busy)");
            }
        }
    </script>
</body>
</html>
