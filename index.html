<!DOCTYPE html>
<html lang="ta">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Downloader - v2.0</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .loader { border-top-color: #3498db; animation: spinner 1.5s linear infinite; }
        @keyframes spinner { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body class="bg-slate-900 text-white min-h-screen p-4 md:p-10">

    <div class="max-w-3xl mx-auto bg-slate-800 p-6 rounded-2xl shadow-2xl border border-slate-700">
        <h1 class="text-3xl font-bold text-center text-blue-400 mb-2">Video Downloader</h1>
        <p class="text-center text-gray-400 text-sm mb-6">Frontend v2.0 | Backend: Python Flask</p>

        <div class="grid grid-cols-1 md:grid-cols-2 gap-4 mb-6">
            <div class="p-3 bg-slate-700 rounded-lg">
                <label class="block text-xs uppercase font-bold text-gray-400">Connection Mode</label>
                <select id="connMode" class="w-full bg-transparent outline-none mt-1" onchange="toggleManualUrl()">
                    <option value="cloudflare">Cloudflare (Auto)</option>
                    <option value="ngrok">NGROK (Manual)</option>
                </select>
            </div>
            <div id="manualUrlDiv" class="p-3 bg-slate-700 rounded-lg hidden">
                <label class="block text-xs uppercase font-bold text-gray-400">Enter NGROK URL</label>
                <input type="text" id="backendUrl" placeholder="https://xxxx.ngrok.io" class="w-full bg-transparent outline-none mt-1 text-blue-300">
            </div>
        </div>

        <div class="flex gap-2 mb-8">
            <input type="text" id="videoUrl" placeholder="Paste YouTube Link Here..." class="flex-1 p-3 rounded-lg bg-slate-900 border border-slate-600 focus:border-blue-500 outline-none">
            <button onclick="fetchVideo()" class="bg-blue-600 hover:bg-blue-700 px-6 py-3 rounded-lg font-bold transition">Fetch</button>
        </div>

        <div id="loading" class="hidden flex justify-center py-10"><div class="loader w-12 h-12 border-4 rounded-full"></div></div>

        <div id="videoDetails" class="hidden">
            <div class="flex flex-col md:flex-row gap-4">
                <img id="thumb" class="w-full md:w-48 rounded-lg object-cover">
                <div>
                    <h2 id="videoTitle" class="text-xl font-semibold mb-4"></h2>
                    <div class="flex gap-4 mb-4">
                        <label class="flex items-center gap-2 cursor-pointer">
                            <input type="radio" name="dest" value="local" checked> Local Download
                        </label>
                        <label class="flex items-center gap-2 cursor-pointer">
                            <input type="radio" name="dest" value="drive"> Save to G-Drive
                        </label>
                    </div>
                </div>
            </div>

            <div class="mt-6 grid grid-cols-1 md:grid-cols-2 gap-6">
                <div>
                    <h3 class="text-blue-400 font-bold mb-2">Video Quality</h3>
                    <div id="vButtons" class="space-y-2"></div>
                </div>
                <div>
                    <h3 class="text-yellow-400 font-bold mb-2">Audio Only</h3>
                    <div id="aButtons" class="space-y-2"></div>
                </div>
            </div>
        </div>
    </div>

    <script>
        function toggleManualUrl() {
            const mode = document.getElementById('connMode').value;
            document.getElementById('manualUrlDiv').classList.toggle('hidden', mode === 'cloudflare');
        }

        async function fetchVideo() {
            const url = document.getElementById('videoUrl').value;
            let base = document.getElementById('connMode').value === 'cloudflare' ? "" : document.getElementById('backendUrl').value;
            
            if(!url) return alert("Please enter URL");
            
            document.getElementById('loading').classList.remove('hidden');
            document.getElementById('videoDetails').classList.add('hidden');

            try {
                const res = await fetch(`${base}/get_info`, {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({url})
                });
                const data = await res.json();

                document.getElementById('videoTitle').innerText = data.title;
                document.getElementById('thumb').src = data.thumbnail;
                
                const vArea = document.getElementById('vButtons');
                vArea.innerHTML = '';
                data.video.forEach(v => {
                    vArea.innerHTML += `<button onclick="downloadFile('${v.id}')" class="w-full text-left bg-slate-700 p-2 rounded hover:bg-slate-600 text-sm">Download ${v.res} (${v.ext})</button>`;
                });

                const aArea = document.getElementById('aButtons');
                aArea.innerHTML = '';
                data.audio.forEach(a => {
                    aArea.innerHTML += `<button onclick="downloadFile('${a.id}')" class="w-full text-left bg-slate-700 p-2 rounded hover:bg-slate-600 text-sm">MP3 ${a.abr}kbps (${a.ext})</button>`;
                });

                document.getElementById('videoDetails').classList.remove('hidden');
            } catch (e) {
                alert("Backend Connection Failed! Check URL.");
            }
            document.getElementById('loading').classList.add('hidden');
        }

        async function downloadFile(formatId) {
            const url = document.getElementById('videoUrl').value;
            const mode = document.querySelector('input[name="dest"]:checked').value;
            let base = document.getElementById('connMode').value === 'cloudflare' ? "" : document.getElementById('backendUrl').value;

            alert("Download started in backend. Please wait...");
            
            const res = await fetch(`${base}/download`, {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({url, format_id: formatId, mode: mode})
            });

            if(mode === 'local') {
                const blob = await res.blob();
                const downloadUrl = window.URL.createObjectURL(blob);
                const a = document.createElement('a');
                a.href = downloadUrl;
                a.download = "video.mp4";
                document.body.appendChild(a);
                a.click();
                a.remove();
            } else {
                const result = await res.json();
                alert(result.message);
            }
        }
    </script>
</body>
</html>
